name: OpenRouter Document Generator

on:
  workflow_dispatch:
  push:
    paths:
      - prompt.txt

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install requests python-docx

      - name: Generate Document
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python << 'EOF'
          import os
          import json
          import requests
          from docx import Document

          API_KEY = os.environ["OPENROUTER_API_KEY"]

          with open("prompt.txt", "r", encoding="utf-8") as f:
              prompt = f.read().strip()

          response = requests.post(
              "https://openrouter.ai/api/v1/chat/completions",
              headers={
                  "Authorization": f"Bearer {API_KEY}",
                  "Content-Type": "application/json"
              },
              json={
                  "model": "openai/gpt-oss-20b:free",
                  "messages": [
                      {
                          "role": "user",
                          "content": prompt
                      }
                  ]
              },
              timeout=300
          )

          print("Status:", response.status_code)

          result = response.json()

          if "choices" not in result:
              print(json.dumps(result, indent=2))
              raise Exception("OpenRouter request failed")

          answer = result["choices"][0]["message"]["content"]

          if "Output format: DOCX" in prompt.upper():
              doc = Document()
              doc.add_heading("AI Generated Document", level=1)
              doc.add_paragraph(answer)
              doc.save("output.docx")

              with open("artifact_name.txt", "w") as f:
                  f.write("output.docx")

              print("Generated output.docx")

          else:
              with open("output.txt", "w", encoding="utf-8") as f:
                  f.write(answer)

              with open("artifact_name.txt", "w") as f:
                  f.write("output.txt")

              print("Generated output.txt")

          EOF

      - name: Upload TXT Artifact
        if: hashFiles('output.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ai-output-txt
          path: output.txt
          retention-days: 30

      - name: Upload DOCX Artifact
        if: hashFiles('output.docx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ai-output-docx
          path: output.docx
          retention-days: 30
