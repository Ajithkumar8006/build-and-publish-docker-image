name: OpenRouter DOCX Generator

on:
  workflow_dispatch:
  push:
    paths:
      - prompt.txt

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-docx

      - name: Generate DOCX
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cat > generate.py << 'EOF'
          import os
          import json
          import requests
          from docx import Document

          api_key = os.environ.get("OPENROUTER_API_KEY")

          if not api_key:
              raise Exception("OPENROUTER_API_KEY secret not found")

          with open("prompt.txt", "r", encoding="utf-8") as f:
              prompt = f.read().strip()

          response = requests.post(
              "https://openrouter.ai/api/v1/chat/completions",
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              },
              json={
                  "model": "openai/gpt-oss-20b:free",
                  "messages": [
                      {
                          "role": "user",
                          "content": prompt
                      }
                  ]
              },
              timeout=300
          )

          print("Status Code:", response.status_code)

          result = response.json()

          if "choices" not in result:
              print(json.dumps(result, indent=2))
              raise Exception("OpenRouter request failed")

          answer = result["choices"][0]["message"]["content"]

          doc = Document()

          doc.add_heading("AI Generated Document", level=1)

          for line in answer.splitlines():
              if line.strip():
                  doc.add_paragraph(line)

          doc.save("output.docx")

          print("Successfully created output.docx")
          EOF

          python generate.py

      - name: Verify Output
        run: |
          ls -lah
          test -f output.docx

      - name: Upload DOCX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-generated-docx
          path: output.docx
          retention-days: 30
