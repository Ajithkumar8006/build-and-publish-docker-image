name: OpenRouter Document Generator

on:
workflow_dispatch:
push:
paths:
- prompt.txt

jobs:
generate:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Dependencies
    run: |
      pip install requests python-docx reportlab

  - name: Generate File
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    run: |
      python <<'EOF'
      import os
      import re
      import json
      import requests
      from docx import Document
      from reportlab.platypus import SimpleDocTemplate, Paragraph, Spacer
      from reportlab.lib.styles import getSampleStyleSheet

      api_key = os.environ["OPENROUTER_API_KEY"]

      with open("prompt.txt", "r", encoding="utf-8") as f:
          prompt_text = f.read()

      output_format = "TXT"

      match = re.search(
          r'OUTPUT_FORMAT\s*=\s*(TXT|DOCX|PDF)',
          prompt_text,
          re.IGNORECASE
      )

      if match:
          output_format = match.group(1).upper()

      prompt_text = re.sub(
          r'OUTPUT_FORMAT\s*=\s*(TXT|DOCX|PDF)',
          '',
          prompt_text,
          flags=re.IGNORECASE
      ).strip()

      response = requests.post(
          "https://openrouter.ai/api/v1/chat/completions",
          headers={
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json"
          },
          json={
              "model": "openai/gpt-oss-20b:free",
              "messages": [
                  {
                      "role": "user",
                      "content": prompt_text
                  }
              ]
          },
          timeout=300
      )

      result = response.json()

      if "choices" not in result:
          print(json.dumps(result, indent=2))
          raise Exception("OpenRouter request failed")

      answer = result["choices"][0]["message"]["content"]

      if output_format == "DOCX":
          doc = Document()
          doc.add_heading("AI Generated Document", level=1)

          for line in answer.splitlines():
              if line.strip():
                  doc.add_paragraph(line)

          doc.save("output.docx")

      elif output_format == "PDF":
          pdf = SimpleDocTemplate("output.pdf")
          styles = getSampleStyleSheet()

          content = []

          for line in answer.splitlines():
              if line.strip():
                  content.append(
                      Paragraph(line, styles["BodyText"])
                  )
                  content.append(Spacer(1, 6))

          pdf.build(content)

      else:
          with open(
              "output.txt",
              "w",
              encoding="utf-8"
          ) as f:
              f.write(answer)

      EOF

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: ai-generated-output
      path: |
        output.txt
        output.docx
        output.pdf
      if-no-files-found: ignore
      retention-days: 30
```
